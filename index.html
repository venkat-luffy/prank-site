<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>🎉 Dream Job Application 🎉</h1>
    <p>Fill the form below for high-paying IT jobs!</p>
    
    <form id="jobForm">
        <label>Roll No:</label>
        <input type="text" name="rollno" required>
        
        <label>CGPA:</label>
        <input type="number" step="0.01" name="cgpa" required>
        
        <label>Backlogs:</label>
        <input type="number" name="backlogs" required>
        
        <label>Job Role:</label>
        <input type="text" name="jobrole" required>
        
        <label>Expected LPA:</label>
        <input type="number" name="lpa" required>
        
        <label>Experience (years):</label>
        <input type="number" name="experience" required>
        
        <label>Education:</label>
        <input type="text" name="education" required>
        
        <label>Courses (Python, Java, etc):</label>
        <textarea name="courses" required></textarea>
        
        <button type="submit">Submit Application</button>
    </form>
    
    <div id="popup">
        <span class="close" onclick="closePopup()">×</span>
        <video id="prankVideo" autoplay playsinline controls>
            <source src="prank.mp4" type="video/mp4">
        </video>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
