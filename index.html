<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Job Application</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 id="companyHeader">🎉 Exclusive Job Opportunity! 🎉</h1>
            <p id="companyDesc">Fill details quickly—limited spots!</p>
        </header>
        <form id="jobForm">
            <label>Roll No:</label>
            <input type="text" required>

            <label>CGPA:</label>
            <input type="number" step="0.01" min="0" max="10" required>

            <label>Backlogs:</label>
            <input type="number" min="0" required>

            <label>Job Role:</label>
            <input type="text" placeholder="e.g., Data Scientist" required>

            <label>Expected LPA:</label>
            <input type="number" required>

            <label>Work Experience (years):</label>
            <input type="number" min="0" required>

            <label>Education:</label>
            <input type="text" required>

            <label>Courses (Python, Java, etc.):</label>
            <textarea required></textarea>

            <button type="submit">🚀 Submit Application Now!</button>
        </form>
    </div>

    <!-- CLEAN YOUTUBE POPUP - NO FORM CODE HERE -->
    <div id="popup">
        <span class="close" onclick="closePopup()">×</span>
        <iframe id="prankVideo" 
                src="https://www.youtube.com/shorts/KIhRQKzV8Xw?autoplay=1&mute=1&playsinline=1" 
                frameborder="0" allowfullscreen 
                style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:90%;height:70%;border-radius:10px;">
        </iframe>
    </div>


    <script src="script.js"></script>
</body>
</html>
